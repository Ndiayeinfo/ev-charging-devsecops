version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ev-charging-mysql
    environment:
      MYSQL_ROOT_PASSWORD: changeme
      MYSQL_DATABASE: ev_charging
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ev-charging-net

  redis:
    image: redis:7-alpine
    container_name: ev-charging-redis
    ports:
      - "6379:6379"
    networks:
      - ev-charging-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ev-charging-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ev-charging-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ev-charging-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - ev-charging-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ev-charging-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: ev-charging
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    ports:
      - "8080:8080"
    networks:
      - ev-charging-net

volumes:
  mysql_data:

networks:
  ev-charging-net:
    driver: bridge

